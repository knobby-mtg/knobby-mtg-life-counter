[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
  -D LV_CONF_INCLUDE_SIMPLE

; Libraries: pin the exact libs/versions referenced in README.md
lib_deps =
  GFX Library for Arduino@^1.6.5
  LVGL@^8.4.0
  CST816S@^1.3.0
  esp32_io_expander@^1.1.1
  ESP32_Display_Panel@^1.0.4
  SensorLib@^0.3.1

; Uncomment and adjust if you need partitioning or flash settings
; board_build.partitions = default

[platformio]
default_envs = esp32s3
